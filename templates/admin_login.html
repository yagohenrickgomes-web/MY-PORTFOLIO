<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Login — Painel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#06060a; color:#f2f3f7; font-family:'Inter',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  .login-box{
    width:100%; max-width:380px; background:rgba(255,255,255,0.045); border:1px solid rgba(255,255,255,0.09);
    border-radius:16px; padding:36px; backdrop-filter: blur(16px);
  }
  h1{ font-family:'Space Grotesk',sans-serif; font-size:22px; margin-bottom:6px; }
  p.sub{ color:#9a9db0; font-size:13px; margin-bottom:28px; }
  label{ display:block; font-size:12px; color:#9a9db0; margin-bottom:6px; }
  input{
    width:100%; padding:12px 14px; margin-bottom:18px; background:rgba(255,255,255,0.045);
    border:1px solid rgba(255,255,255,0.09); border-radius:10px; color:#f2f3f7; font-size:14px;
  }
  input:focus{ outline:none; border-color:#4f7cff; }
  button{
    width:100%; padding:13px; border:none; border-radius:100px; cursor:pointer;
    background:linear-gradient(135deg,#4f7cff,#9b6bff); color:#fff; font-weight:600; font-size:14px;
  }
  .error{ background:rgba(255,80,80,0.12); border:1px solid rgba(255,80,80,0.3); color:#ff9b9b;
    padding:10px 14px; border-radius:10px; font-size:13px; margin-bottom:18px; }
  a.back{ display:block; text-align:center; margin-top:20px; color:#63667a; font-size:12px; text-decoration:none; }
</style>
</head>
<body>
  <div class="login-box">
    <h1>Painel Admin</h1>
    <p class="sub">Yago Henrick — Portfólio</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post" action="{{ admin_base }}/login">
      <label for="username">Usuário</label>
      <input type="text" id="username" name="username" required autofocus>
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Entrar</button>
    </form>
    <a class="back" href="/">← Voltar ao site</a>
  </div>
</body>
</html>
